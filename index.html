
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus AIOS</title>
    <!-- Global Error Handler -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Global Error:", message, error);
        if (!message.toString().includes('Script error')) {
            // Suppress alert for cleaner UX, log to console is sufficient for dev
        }
      };
    </script>
    <!-- Polyfill for process -->
    <script>
      (function() {
        var env = { NODE_ENV: 'development' };
        if (typeof process === 'undefined') {
          window.process = { env: env };
        } else if (!process.env) {
          process.env = env;
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
            },
            colors: {
              background: "rgb(var(--background) / <alpha-value>)",
              foreground: "rgb(var(--foreground) / <alpha-value>)",
              border: "rgb(var(--border) / <alpha-value>)",
              input: "rgb(var(--input) / <alpha-value>)",
              ring: "rgb(var(--ring) / <alpha-value>)",
              primary: {
                DEFAULT: "rgb(var(--primary) / <alpha-value>)",
                foreground: "rgb(var(--primary-foreground) / <alpha-value>)",
              },
              secondary: {
                DEFAULT: "rgb(var(--secondary) / <alpha-value>)",
                foreground: "rgb(var(--secondary-foreground) / <alpha-value>)",
              },
              destructive: {
                DEFAULT: "rgb(var(--destructive) / <alpha-value>)",
                foreground: "rgb(var(--destructive-foreground) / <alpha-value>)",
              },
              muted: {
                DEFAULT: "rgb(var(--muted) / <alpha-value>)",
                foreground: "rgb(var(--muted-foreground) / <alpha-value>)",
              },
              accent: {
                DEFAULT: "rgb(var(--accent) / <alpha-value>)",
                foreground: "rgb(var(--accent-foreground) / <alpha-value>)",
              },
              popover: {
                DEFAULT: "rgb(var(--popover) / <alpha-value>)",
                foreground: "rgb(var(--popover-foreground) / <alpha-value>)",
              },
              card: {
                DEFAULT: "rgb(var(--card) / <alpha-value>)",
                foreground: "rgb(var(--card-foreground) / <alpha-value>)",
              },
              nexus: {
                brain: "#007AFF",
                memory: "#BF5AF2",
                tool: "#32D74B",
                alert: "#FF9F0A",
              }
            },
            borderRadius: {
              lg: "0.75rem",
              md: "0.5rem",
              sm: "0.25rem",
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 8s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

      :root {
        /* Light Mode - Aether Glass (Frosted White) */
        --background: 240 242 245; /* Soft grey-blue tint */
        --foreground: 23 23 23;    /* Near black */
        --card: 255 255 255;
        --card-foreground: 23 23 23;
        --popover: 255 255 255;
        --popover-foreground: 23 23 23;
        --primary: 0 112 243;      /* Vibrant Blue */
        --primary-foreground: 255 255 255;
        --secondary: 230 232 235;
        --secondary-foreground: 23 23 23;
        --muted: 243 244 246;
        --muted-foreground: 107 114 128;
        --accent: 255 255 255;
        --accent-foreground: 23 23 23;
        --destructive: 239 68 68;
        --destructive-foreground: 255 255 255;
        --border: 220 220 230;     /* Crisp borders */
        --input: 220 220 230;
        --ring: 0 112 243;
        
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.8);
        --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        --glass-blur: 24px;
      }
    
      .dark {
        /* Dark Mode - Deep Space (Neon Accents) */
        --background: 5 5 5;       /* True Black */
        --foreground: 250 250 250;
        --card: 20 20 22;
        --card-foreground: 250 250 250;
        --popover: 20 20 22;
        --popover-foreground: 250 250 250;
        --primary: 59 130 246;     /* Neon Blue */
        --primary-foreground: 255 255 255;
        --secondary: 30 30 35;
        --secondary-foreground: 250 250 250;
        --muted: 20 20 22;
        --muted-foreground: 156 163 175;
        --accent: 30 30 35;
        --accent-foreground: 250 250 250;
        --destructive: 220 38 38;
        --destructive-foreground: 255 255 255;
        --border: 40 40 45;
        --input: 40 40 45;
        --ring: 59 130 246;

        --glass-bg: rgba(20, 20, 25, 0.7);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        --glass-blur: 24px;
      }

      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
      }
      
      body {
        cursor: default;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        overflow: hidden; 
        background-color: rgb(var(--background));
        color: rgb(var(--foreground));
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Utilities */
      .glow-text {
        text-shadow: 0 0 10px rgb(var(--primary) / 0.5);
      }
    </style>
